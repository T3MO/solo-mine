name = "solo-mine"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# Cloudflare Pages — Build Configuration
# ============================================================================
# Configure these in the Cloudflare Pages dashboard (Settings → Builds):
#   Framework preset:      Next.js
#   Build command:         npm run pages:build
#   Build output dir:      .vercel/output/static
#   Root directory:        (leave blank)
#   Node.js version:       20
#
# ============================================================================
# Environment Variables
# ============================================================================
# Set secrets in the Cloudflare Pages dashboard (Settings → Environment variables).
# Never commit real values here.
#
# Required:
#   ADMIN_TOKEN
#   ADMIN_PASSWORD_HASH
#
# Optional (email):
#   NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   RESEND_API_KEY
#   RESEND_FROM_EMAIL
#   RESEND_REPLY_TO
#   CONVERTKIT_API_KEY
#   CONVERTKIT_API_SECRET
#   CONVERTKIT_FORM_ID
#
# Optional (analytics):
#   NEXT_PUBLIC_PLAUSIBLE_DOMAIN
#
# Public:
#   NEXT_PUBLIC_SITE_URL = "https://solomine.io"

[vars]
NEXT_PUBLIC_SITE_URL = "https://solomine.io"
